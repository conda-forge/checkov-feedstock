schema_version: 1

context:
  name: checkov
  version: "3.2.489"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/${{ name[0] }}/${{ name }}/checkov-${{ version }}.tar.gz
  sha256: ca3d92c8b1c14405f00cdb9f2cea726f209b1967fcca2e9386800d33233da274

build:
  noarch: python
  number: 2
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - urllib3 >=1.26.20
    - typing_extensions >=4.5.0
    - python
    - bc-python-hcl2 >=0.4.3
    - bc-detect-secrets >=1.5.45
    - bc-jsonpath-ng >=1.6.1
    - pycep-parser >=0.5.1
    - tabulate >=0.9.0
    - colorama >=0.4.3
    - termcolor >=1.1.0
    - junit-xml >=1.9
    - dpath >=2.1.3
    - pyyaml >=6.0.0
    - boto3 >=1.35.49
    - botocore >=1.35.49
    - gitpython >=3.1.30
    - jmespath >=1.0.0
    - tqdm >=4.65.0
    - packaging >=23.0
    - cloudsplaining >=0.7.0
    - networkx
    - dockerfile-parse >=2.0.0
    - docker-py >=6.0.1
    - configargparse >=1.5.3
    - argcomplete >=3.0.0
    - typing-extensions >=4.5.0
    - importlib-metadata >=6.0.0
    - cachetools >=5.2.0
    - cyclonedx-python-lib >=6.0.0
    - packageurl-python >=0.11.1
    - click >=8.1.0
    - aiohttp >=3.8.0
    - aiodns >=3.0.0
    - aiomultiprocess >=0.9.0
    - schema
    - jsonschema >=4.17.0
    - prettytable >=3.6.0
    - charset-normalizer >=3.1.0
    - if: match(python, "<3.11") and unix and x86_64
      then: pyston_lite_autoload >=2.3.5
    - if: match(python, "<3.11") and unix and x86_64
      then: pyston_lite >=2.3.5
    - requests >=2.28.0
    - yarl >=1.9.1
    - spdx-tools >=0.8.0
    - license-expression >=30.1.0
    - rustworkx >=0.13.0
    - pydantic >=2.0.0
    - asteval >=1.0.6

tests:
  - python:
      imports:
        - checkov

about:
  summary: Infrastructure as code static analysis
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/bridgecrewio/checkov

extra:
  recipe-maintainers:
    - borchero
    - nick-harmening
    - xhochy
